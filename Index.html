<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            font-size: 24px;
        }

        button {
            padding: 10px 15px;
            margin: 10px;
            cursor: pointer;
            border: none;
            background-color: #3498db;
            color: white;
            border-radius: 5px;
        }

        button:hover {
            background-color: #2980b9;
        }

        input {
            padding: 8px;
            margin: 10px;
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 50%;
            display: none;
        }

        table, th, td {
            border: 1px solid #333;
        }

        th, td {
            padding: 10px;
        }

        th {
            background-color: #2c3e50;
            color: white;
        }
    </style>
</head>
<body>

<header>
    Hello 23rd March Batch
</header>

<div>
    <button onclick="showUsers()">Show Users</button>
</div>

<div>
    <input type="text" id="username" placeholder="Enter new user name">
    <button onclick="addUser()">Add User</button>
</div>

<table id="userTable">
    <thead>
        <tr>
            <th>Sl. No</th>
            <th>User Name</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<script>
    let users = [
        "Arjun",
        "Akhil",
        "Madhav",
        "Pavan",
        "Keshav",
        "Ashish",
        "Sai Kiran",
        "Sumith",
        "Eswar",
        "Amaye",
        "Nidish",
        "Adwaith"
    ];

    function showUsers() {
        let table = document.getElementById("userTable");
        let tbody = document.getElementById("tableBody");

        tbody.innerHTML = "";

        users.forEach((user, index) => {
            let row = `<tr>
                        <td>${index + 1}</td>
                        <td>${user}</td>
                       </tr>`;
            tbody.innerHTML += row;
        });

        table.style.display = "table";
    }

    function addUser() {
        let input = document.getElementById("username");
        let name = input.value.trim();

        if (name === "") {
            alert("Please enter a valid name");
            return;
        }

        users.push(name);
        input.value = "";

        showUsers(); // refresh table
    }
</script>

</body>
</html>
